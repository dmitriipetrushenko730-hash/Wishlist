<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Семейный Вишлист</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-user="default">

<div class="container">
    <!-- Экран 1: Выбор пользователя -->
    <div id="screen-login" class="screen active">
        <h1 id="login-title">Кто ты?</h1>
        <div id="login-buttons"></div>
    </div>

    <!-- Экран 2: Главное меню -->
    <div id="screen-menu" class="screen">
        <h1 id="welcome-text">Здравствуйте!</h1>
        <button id="btn-edit-wishlist" onclick="openMyWishlist()">Редактировать вишлист</button>
        <button id="btn-view-wishlists" onclick="openViewSelection()">Просмотр вишлистов</button>
        <button id="btn-logout" class="secondary" onclick="logout()">Сменить пользователя</button>
        
        <!-- Селектор языка -->
        <div class="lang-selector-container">
            <div class="lang-selector-header" onclick="toggleLangDropdown()">
                <span id="lang-label">Язык:</span>
                <div class="lang-current">
                    <span id="current-flag" class="flag"></span>
                    <span id="current-lang-txt">Русский</span>
                    <span class="arrow">▼</span>
                </div>
            </div>
            <div id="lang-dropdown" class="lang-dropdown">
                <div class="lang-option" onclick="changeLanguage('ru')">
                    <span class="flag">🇷🇺</span> Русский
                </div>
                <div class="lang-option" onclick="changeLanguage('en')">
                    <span class="flag">🇺🇸</span> English
                </div>
                <div class="lang-option" onclick="changeLanguage('de')">
                    <span class="flag">🇩🇪</span> Deutsch
                </div>
            </div>
        </div>
    </div>

    <!-- Экран 3: Редактирование своего вишлиста -->
    <div id="screen-my-list" class="screen">
        <h2 id="my-list-title">Мой вишлист</h2>
        <div class="input-group">
            <input type="text" id="wish-input" placeholder="напиши своё пожелание">
            <button id="btn-add-wish" onclick="addWish()">Добавить</button>
        </div>
        <ul id="my-wishes-ul"></ul>
        <button id="btn-back-menu-1" class="secondary" onclick="backToMenu()">Назад в меню</button>
    </div>

    <!-- Экран 4: Выбор чужого вишлиста -->
    <div id="screen-view-selection" class="screen">
        <h2 id="view-selection-title">Чей вишлист посмотреть?</h2>
        <div id="view-buttons"></div>
        <button id="btn-back-menu-2" class="secondary" onclick="backToMenu()">Назад в меню</button>
    </div>

    <!-- Экран 5: Просмотр чужого вишлиста -->
    <div id="screen-friend-list" class="screen">
        <h2 id="friend-list-title">Вишлист</h2>
        <ul id="friend-wishes-ul"></ul>
        <button id="btn-back-selection" class="secondary" onclick="openViewSelection()">Назад к выбору</button>
    </div>
</div>

<script src="script.txt"></script>
</body>
</html>
